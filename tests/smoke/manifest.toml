]
description = "Agency MUST NOT pick the claude executor for an agent whose role defaults to claude when the task model has a non-Anthropic provider prefix (local:, openrouter:, oai-compat:, openai:). Regression for the autohaiku 100% failure: agent.executor=claude (default) + model=local:qwen3-coder routed every spawn through the claude CLI which 404'd. Asserts the dispatcher's SpawnPlan provenance line shows executor=native, never claude, for a local: model assigned to a default-claude agent."
timeout_seconds = 30

[[scenario]]
name = "dispatcher_codex_wins_over_agency"
