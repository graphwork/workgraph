# Smoke gate manifest
#
# `wg done <task>` runs every scenario whose `owners` list contains the task
# id. If any scenario FAILs (any non-zero exit code other than 77), `wg done`
# refuses with the broken scenario name. Exit 77 = loud SKIP (e.g. endpoint
# unreachable). Exit 0 = PASS.
#
# This manifest is grow-only: every regression in this codebase that a smoke
# would have caught becomes a permanent scenario. Do not delete entries —
# extend.
#
# Scenarios run as `bash <script>` from the directory containing this
# manifest. Each scenario receives `WG_SMOKE_SCENARIO` and
# `WG_SMOKE_TIMEOUT_SECS` in its environment.
#
# Owners are task ids (kebab-case). When in doubt, include the task that
# introduced the regression and the task that fixed it.

[[scenario]]
name = "nex_two_message_against_lambda01"
script = "scenarios/nex_two_message_against_lambda01.sh"
owners = [
    "wg-nex-native",
    "wg-nex-native-2",
    "wg-nex-native-3",
    "fix-compaction-llm",
    "smoke-test-gap",
    "smoke-gate-is",
]
description = "Live two-message wg chat against a real lambda01 endpoint via wg nex. Repros the user-reported 'why isn't this working' first-message regression."
timeout_seconds = 240

