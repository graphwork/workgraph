[[scenario]]
name = "agency_local_model_overrides_claude_executor"
script = "scenarios/agency_local_model_overrides_claude_executor.sh"
owners = [
    "agency-picks-claude",
    "agency-still-picks",
    "smoke-gate-is",
]
description = "Agency MUST NOT pick the claude executor for an agent whose role defaults to claude when the task model has a non-Anthropic provider prefix (local:, openrouter:, oai-compat:, openai:). Regression for the autohaiku 100% failure: agent.executor=claude (default) + model=local:qwen3-coder routed every spawn through the claude CLI which 404'd. Asserts the dispatcher's SpawnPlan provenance line shows executor=native, never claude, for a local: model assigned to a default-claude agent."
timeout_seconds = 30

[[scenario]]
name = "dispatcher_codex_wins_over_agency"
script = "scenarios/dispatcher_codex_wins_over_agency.sh"
owners = [
    "agency-still-picks",
    "smoke-gate-is",
]
description = "Dispatcher's explicit `-x codex` MUST win when the assigned agent has only the default claude executor and the task model is `local:qwen3-coder`. Regression for agency-still-picks: the previous fix (agency-picks-claude) put the model-compat override INSIDE the agency, where it fired BEFORE the dispatcher's executor floor in resolve_executor's precedence — silently rewriting `-x codex` to native. Asserts SpawnPlan executor=codex (never native, never claude) for the codex+local: combo."
timeout_seconds = 30

[[scenario]]
name = "codex_oai_5turn_lambda01"
script = "scenarios/codex_oai_5turn_lambda01.sh"
owners = [
    "thin-wrapper-impl",
    "thin-wrapper-smoke",
    "smoke-gate-is",
]
description = "Live 5-turn wg chat against a real lambda01-style endpoint via the codex thin-wrapper executor. Reproduces the user's verbatim repro (`wg init -m qwen3-coder -e https://lambda01...:30000 -x codex; wg service start; send 5 messages back-to-back`). Asserts behaviorally — outbox has 5 'coordinator' responses, each non-empty, each with a distinct request_id — so silent-dedup or stuck-after-turn-1 regressions cannot pass. Loud-skips when codex CLI is missing or the endpoint's Responses API is unreachable."
timeout_seconds = 600
