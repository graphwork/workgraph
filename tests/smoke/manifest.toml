description = "Pins bug-retry-doesnt-clear-stale-downstream-claims: `wg retry <upstream>` must walk the forward closure and clear `assigned` on any non-terminal downstream task whose claim references a Dead/missing agent. Pre-fix the dispatcher silently skipped stale-claimed downstream tasks forever; the user's fan-out workflow stalled with 'spawned=0' for hours. Builds upstream→downstream, claims downstream with an absent agent, fails+retries upstream, asserts (a) downstream.assigned cleared, (b) downstream.status==Open, (c) log records the cleanup cause."
timeout_seconds = 30

