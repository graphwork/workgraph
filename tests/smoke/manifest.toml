script = "scenarios/evaluate_accepts_pending_eval.sh"
owners = [
    "bug-flip-and",
    "smoke-gate-is",
]
description = "wg evaluate run (and --flip) MUST accept Status::PendingEval as a valid input state. Regression for the 2026-04-27 mass-fail: ~30 .flip-* / .evaluate-* tasks auto-failed with 'has status PendingEval — must be done or failed to evaluate' because the dispatcher correctly fires those tasks while parent is still PendingEval (per the eval-gated unblock contract) but evaluate.rs's precondition rejected it."
timeout_seconds = 30

[[scenario]]
name = "tui_retire_chat_via_ctrl_w"
script = "scenarios/tui_retire_chat_via_ctrl_w.sh"
owners = [
    "tui-cannot-retire",
    "smoke-gate-is",
]
description = "Pins user-reported tui-cannot-retire regression: 'man why can't we retire the .chat-4 ???'. The embedded vendor CLI (claude --resume) shows a session-resume modal that swallows Esc/digit keys, so the user has no way to reach wg's Archive/Stop/Abandon dialog. Ctrl+W must be a global escape hatch that breaks out of PTY forwarding AND opens the retire dialog. Drives a real `wg tui` with three live chats, sends Ctrl+T (focus PTY) → Ctrl+W → 'x' (Abandon hotkey), and asserts the visible chat-tab count drops AND graph.jsonl shows ≥1 abandoned task."
timeout_seconds = 90

[[scenario]]
name = "smoke_cleanup_survives_panic"
script = "scenarios/smoke_cleanup_survives_panic.sh"
owners = [
    "smoke-tests-leak",
    "smoke-gate-is",
]
description = "Pins the smoke-tests-leak regression: production runs left 70+ orphaned `wg service daemon` processes and 200+ /tmp scratch dirs because per-test traps did not survive SIGKILL/panic. Spawns a real daemon in a child shell, kills the child with SIGKILL (no trap fires), then asserts wg_smoke_sweep reaps both the re-parented daemon and the leftover scratch dir. Defense in depth for the central trap in `tests/smoke/scenarios/_helpers.sh`."
timeout_seconds = 60

[[scenario]]
name = "reaper_retry_in_place_protected"
script = "scenarios/reaper_retry_in_place_protected.sh"
owners = [
    "reaper-edge-case",
    "worktree-target-dirs",
    "smoke-gate-is",
]
description = "Pins reaper-edge-case: `wg sweep --reap-targets` MUST NOT remove `target/` from a worktree currently occupied by a `wg retry`-in-place agent whose ID differs from the directory name. Asserts (a) live agent-B at $$ + worktree_path = .wg-worktrees/agent-A protects target/ even though agent-A (matching the dir name) is dead, and (b) negative control — once agent-B is also marked dead with an unreachable PID, target/ is correctly reaped. No LLM credentials needed; pure registry+filesystem assertions."
timeout_seconds = 30

[[scenario]]
name = "retry_kills_in_progress_agent"
script = "scenarios/retry_kills_in_progress_agent.sh"
owners = [
    "add-wg-retry",
    "smoke-gate-is",
]
description = "Pins add-wg-retry: `wg retry <task>` and `wg agents kill <agent>` MUST terminate hung worker processes, mark the agent Dead in the registry, and reset in-progress tasks to Open with retry_count incremented. Spawns real long-running `sleep 600` processes to stand in for hung workers; hand-crafts graph.jsonl + registry.json to bind them to in-progress tasks; asserts (a) `wg agents kill` kills the live PID and marks the agent Dead, (b) re-running `wg agents kill` on a now-dead or absent agent succeeds (no-op semantics), (c) `wg retry` on an in-progress hung task kills the worker, transitions to Open, increments retry_count 0→1, and records --reason in the log. No LLM required; pure process+graph assertions."
timeout_seconds = 60

[[scenario]]
name = "tui_chat_redesign_modal_close_persist"
script = "scenarios/tui_chat_redesign_modal_close_persist.sh"
owners = [
    "integrate-tui-chat",
    "implement-tui-modal",
    "implement-tui-tabs",
    "implement-tui-tab",
    "smoke-gate-is",
]
description = "Pins the three critical invariants of the TUI chat redesign (umbrella: integrate-tui-chat). (1) MODAL TOGGLE: chat tab shows [PTY]/[CMD] modal indicator; Ctrl+T flips between them. Without this, users have no visual cue that the modal contract — which stops Ctrl+N/Ctrl+W/letters from being intercepted as global hotkeys inside the embedded vendor CLI — is in effect. (2) CLOSE IS NON-DESTRUCTIVE: Ctrl+W in command mode closes the active tab (visible tab count drops by 1), the underlying graph task status stays unchanged (NOT marked abandoned/archived), and NO ChoiceDialog appears. The redesign explicitly removed the close-confirmation dialog from the tab-close path. (3) PERSISTENCE: relaunching `wg tui` after a kill restores the last-active coordinator id from tui-state.json. Drives a real `wg tui` inside tmux, sends synthetic Ctrl+T / Ctrl+W / digit keys via tmux send-keys, and asserts on `wg --json tui-dump`'s screen text + graph.jsonl statuses + tui-state.json contents."
timeout_seconds = 120

[[scenario]]
name = "native_executor_keyless_init"
script = "scenarios/native_executor_keyless_init.sh"
owners = [
    "native-executor-client",
    "smoke-gate-is",
]
description = "Pins the user contract: `wg init -m qwen3-coder -e <URL> --executor nex` with NO env vars MUST be sufficient. The autohaiku 100%-failure regression had wg native-exec bailing at init with 'No Anthropic API key found' because the OAI-compat client init path called the Anthropic key resolver as a fallback. This scenario asserts (a) init succeeds without any *_API_KEY env var, (b) config.toml has a complete [[llm_endpoints.endpoints]] block, (c) wg list does not surface ANTHROPIC_API_KEY in errors, (d) native-exec --help advertises --api-key. The wire-level assertions (Authorization header omitted on no-key, configured key wins over env vars, 401 surfaces config-block-named error) live in tests/integration_native_coordinator.rs::credential_wire_contract."
timeout_seconds = 30

[[scenario]]
name = "agency_inline_spawn_registers_executor_claude"
script = "scenarios/agency_inline_spawn_registers_executor_claude.sh"
owners = [
    "migrate-agency-tasks",
    "smoke-gate-is",
]
description = "Inline spawn of an `.evaluate-*` task must register the agent with `executor=\"claude\"` (not legacy `\"eval\"`) in both registry.json and the agent's metadata.json. Regression: agency one-shot LLM calls share the claude CLI dispatch path with worker agents, so the registered executor label must reflect that — `executor=\"eval\"` was misleading observability noise that masked today's openrouter-cascade outage."
timeout_seconds = 60

[[scenario]]
name = "dispatcher_kick_bypasses_settling_delay"
script = "scenarios/dispatcher_kick_bypasses_settling_delay.sh"
owners = [
    "dispatcher-poll-lower",
    "smoke-gate-is",
]
description = "Pins the kick-dispatcher contract for user-initiated state mutations. After `wg add --immediate` (and equivalently `wg publish` / `wg unclaim` / `wg service resume`), the daemon log MUST show `KickDispatcher received, ticking immediately` and a coordinator tick MUST fire within 1 second — bypassing the 2s settling delay used by GraphChanged. Pre-fix the dispatcher waited the full settling_delay on every CLI mutation, on top of a 30-60s safety-timer poll, so users perceived dead air after every state-changing command. If a future change reverts callers to notify_graph_changed (or removes the kick fast-path in the daemon loop), this scenario fails."
timeout_seconds = 30

[[scenario]]
name = "reset_clears_claim"
script = "scenarios/reset_clears_claim.sh"
owners = [
    "fold-unclaim-semantics",
    "smoke-gate-is",
]
description = "`wg reset` must clear the `assigned` claim field so reset tasks are immediately ready for fresh dispatch. Regression: dead-agent claims survived reset; user had to `wg unclaim` each task by hand or it looked identical to the dispatcher-poll bug."
timeout_seconds = 30


[[scenario]]
name = "chat_launched_with_codex_uses_codex"
script = "scenarios/chat_launched_with_codex_uses_codex.sh"
owners = [
    "chat-launched-with",
    "smoke-gate-is",
]
description = "Regression for chat-launched-with: launching a chat with --executor codex --model codex:gpt-5 against a project whose default is claude:opus must dispatch wg codex-handler with -m codex:gpt-5, NOT wg claude-handler with -m claude:opus. Locks both halves of the fix end-to-end: (1) wg chat create persists executor_override and model_override into CoordinatorState, (2) spawn-task with WG_EXECUTOR_TYPE=codex + WG_MODEL=codex:gpt-5 honors WG_MODEL alongside WG_EXECUTOR_TYPE in plan_spawn (pre-fix: WG_MODEL was dropped, the codex handler ran with claude:opus). The TUI auto-PTY half is locked by unit tests in chat_pty_executor_resolution_tests."
timeout_seconds = 30
