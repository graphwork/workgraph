    "fix-codex-chat-3",
]
description = "Pins fix-codex-chat-3: codex chat in wg TUI must (1) render real-time animation frames between user keypresses and (2) NOT stack spinner copies in scrollback as the user scrolls back. Bug 1 = event loop's idle-poll branch never redrew on PTY byte arrivals (refresh interval 1 Hz against codex's 10-20 Hz frames); fix wires per-pane bytes_processed watermark into has_timed_ui_elements. Bug 2 = codex emits each frame as a DEC mode 2026 (BSU/ESU) sync block whose trailing \\r\\n scrolls one row off the top per frame, accumulating in scrollback (vt100 0.16 doesn't implement BSU/ESU); fix intercepts the markers in the reader thread and trims sync-induced scrollback growth via reflow. Runs unit tests for both halves; no live LLM/codex endpoint required (synthesized byte streams matching codex 0.125.0's actual pattern)."
timeout_seconds = 180

